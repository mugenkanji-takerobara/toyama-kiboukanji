<!DOCTYPE html>
<html lang="ja">
<head>
<style>
/* タイトル画面（背景＋右下4ボタンだけ） */
#title-screen {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#title-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("title-kiboukanji.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: top;
  z-index: 0;
  pointer-events: none;
}

.menu-buttons {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 24%;
  display: flex;
  flex-direction: column;
  gap: 25px;
  z-index: 10;
  pointer-events: auto;
}

.menu-buttons button {
  font-size: 1.6rem;
  width: 100%;
  padding: 22px 10px;  /* ← 高さ統一 */
  background: linear-gradient(#d4a017, #8a6f00);
  color: #fff;
  border: 2px solid #5c4a00;
  border-radius: 10px;
  font-weight: bold;
}

.hidden {
  display: none;
}
#toyamaScreen {
  position: relative;
  z-index: 1;
}
#gameScreen {
  position: relative;
  z-index: 1;
}

.hidden {
  display: none !important;
  pointer-events: none !important;
}
/* 表示中の画面はタップ可能にする */
.screen,
#title-screen,
#gameScreen,
#toyamaScreen,
#tateyamaDetailScreen,
#cityHallDetailScreen,
#amaharashiDetailScreen,
#storyScreen,
.story-inner {
  pointer-events: auto !important;
}
/* 説明書オーバーレイ */
#manualOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  overflow-y: auto;
  z-index: 9999;
  padding: 20px 0;
}

/* 閉じるボタン */
.manual-close {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 10000;
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  background: #fff;
  color: #333;
  font-weight: 700;
}

/* ページ送りナビ */
.manual-nav {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 10000;
}

.manual-btn {
  background: #fff;
  border: none;
  padding: 8px 14px;
  font-size: 18px;
  border-radius: 6px;
  font-weight: 700;
}

.manual-page {
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}

/* スライドコンテナ */
.manual-content {
  margin-top: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#manualOverlay.hidden .manual-content {
  display: none;
}
</style>
</head>
<body>

<div id="bonusDialog" style="display:none;">
  <div class="bonus-dialog-inner">
    <div class="bonus-dialog-title" id="bonusDialogTitle">ボーナス</div>
    <div class="bonus-dialog-text" id="bonusDialogText">
      この二つを入れ替えます
    </div>
    <div class="bonus-dialog-buttons">
      <button id="bonusOkBtn">入れ替える</button>
      <button id="bonusCancelBtn">やめる</button>
    </div>
  </div>
</div>
<div id="title-screen" class="screen">
  <div class="menu-buttons">
      <button id="btn-start" class="menu-btn">ゲーム<br>スタート</button>
      <button id="btn-howto" class="menu-btn">使いかた</button>
      <button id="btn-toyama" class="menu-btn">とやま</button>
   </div>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" class="hidden">
  <div class="screen-inner">
    <div id="wrap">

      <canvas id="c" width="360" height="640"></canvas>

      <div id="gameControlButtons">
        <button id="pauseBtn">一時停止 ||</button>
        <button id="mainBtn">メイン</button>
      </div>

      <div id="controls">
        <button id="easyBtn" onclick="startGame('easy')">やさしい</button>
        <button id="hardBtn" onclick="startGame('hard')">むずかしい</button>
        <button id="resetBtn" onclick="resetRecords()">記録をリセット</button>
        <button id="restartBtn" onclick="restartGame()" style="display:none;">もう一度</button>
        <button id="manualBtn">操作方法</button>
      </div>

      <div id="info">
        左右スワイプで移動、下スワイプで加速！<br>
        縦か横に3つそろえると消えるよ。
      </div>

    </div>
  </div>
</div>

</body>
<script src="toyama-kiboukanji-j.js"></script>
</html>
