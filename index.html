<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>きぼうかんじ</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #fdfaf3;
  font-family: "Hiragino Sans", sans-serif;
}

/* 画面共通 */
.screen {
  display: none;
  width: 100%;
  height: 100vh;
  overflow-y: auto;
}

.screen.active {
  display: block;
}

/* ボタン */
button {
  font-size: 1.4rem;
  padding: 14px 24px;
  margin: 12px;
  border-radius: 12px;
  border: none;
  background: #ffdd66;
  box-shadow: 0 4px 0 #c9a74e;
}

/* 説明書オーバーレイ */
#manualOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

#manualOverlay.active {
  display: flex;
}

.manual-box {
  width: 90%;
  max-width: 480px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

/* 透明レイヤー対策（重要） */
.screen {
  pointer-events: none;
}
.screen.active {
  pointer-events: auto;
}
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="title-screen" class="screen active">
  <h1>きぼうかんじ</h1>
  <button id="start-button">はじめる</button>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="screen">
  <button id="manual-button">説明書</button>
  <button id="toyama-button">とやま</button>
  <button id="story-button">物語</button>
</div>

<!-- とやま画面 -->
<div id="toyamaScreen" class="screen">
  <h2>とやま</h2>
  <button id="back-to-game">戻る</button>
</div>

<!-- 物語画面 -->
<div id="storyScreen" class="screen">
  <h2>物語</h2>
  <!-- ★ここにあなたの画像を戻す -->
  <button id="story-back">戻る</button>
</div>

<!-- 説明書 -->
<div id="manualOverlay">
  <div class="manual-box">
    <h2>説明書</h2>
    <!-- ★ここにQRコードを戻す -->
    <button id="close-manual">閉じる</button>
  </div>
</div>

<script>
// 画面切り替え
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// タイトル → ゲーム
document.getElementById("start-button").onclick = () => show("game-screen");

// ゲーム → 説明書
document.getElementById("manual-button").onclick = () => {
  document.getElementById("manualOverlay").classList.add("active");
};

// 説明書閉じる
document.getElementById("close-manual").onclick = () => {
  document.getElementById("manualOverlay").classList.remove("active");
};

// ゲーム → とやま
document.getElementById("toyama-button").onclick = () => show("toyamaScreen");

// とやま → ゲーム
document.getElementById("back-to-game").onclick = () => show("game-screen");

// ゲーム → 物語
document.getElementById("story-button").onclick = () => show("storyScreen");

// 物語 → ゲーム
document.getElementById("story-back").onclick = () => show("game-screen");
</script>

</body>
</html>
